<!doctype html>
<html lang="it">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d12" />
    <title>Hitster Web</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header class="topbar">
        <div class="brand">
            <div class="logo">♪</div>
            <div>
                <h1>Hitster Web</h1>
                <p>Scan → 30s random → Reveal</p>
            </div>
        </div>
        <div id="stateBadge" class="badge">LOGGED OUT</div>
    </header>

    <main class="container">
        <section id="panel" class="panel" aria-live="polite"></section>
    </main>

    <section id="errorModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="errorTitle">
        <div class="modal-card">
            <div class="modal-head">
                <h2 id="errorTitle">Errore</h2>
                <button id="closeErrorBtn" class="icon-btn" aria-label="Chiudi">✕</button>
            </div>
            <p id="errorText"></p>
            <div class="modal-actions">
                <button id="retryBtn" class="btn">Riprova</button>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/html5-qrcode" defer></script>
    <script src="https://sdk.scdn.co/spotify-player.js" defer></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
